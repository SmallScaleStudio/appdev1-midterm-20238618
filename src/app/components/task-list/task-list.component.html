<div class="container py-4">
  <div class="row mb-4">
    <div class="col-12 text-center text-md-start">
      <h2 class="fw-bold">My Task Manager</h2>
      <p class="text-muted">
        <span class="badge bg-light text-dark border">App Dev 1</span>
        <span class="badge bg-light text-dark border ms-1">Midterm Examination</span>
      </p>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive"> <table class="table table-hover align-middle mb-0">
          </table>
      </div>
    </div>
  </div>
</div>



<div class="card shadow-sm">
  <div class="card-header bg-white d-flex justify-content-between align-items-center">
    <h4 class="mb-0 text-primary">All Tasks</h4>
    <a routerLink="/tasks/new" class="btn btn-primary btn-sm">+ Add Task</a>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead class="table-light">
          <tr>
            <th>Title</th>
            <th>Due Date</th>
            <th>Priority</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let task of tasks">
            <td>
              <a [routerLink]="['/tasks', task.id]" class="text-decoration-none fw-bold">
                {{ task.title }}
              </a>
            </td>
            <td>{{ task.dueDate | date:'mediumDate' }}</td>
            <td>
              <span class="badge" 
                [ngClass]="{
                  'bg-danger': task.priority === 'High',
                  'bg-warning text-dark': task.priority === 'Medium',
                  'bg-info': task.priority === 'Low'
                }">
                {{ task.priority }}
              </span>
            </td>
            <td>
              <span class="badge rounded-pill" 
                [ngClass]="{
                  'bg-success': task.status === 'Completed',
                  'bg-primary': task.status === 'In Progress',
                  'bg-secondary': task.status === 'Pending'
                }">
                {{ task.status }}
              </span>
            </td>
            <td class="text-center">
              <button (click)="onToggle(task.id)" class="btn btn-outline-secondary btn-sm me-1">
                Toggle Status
              </button>
              <button class="btn btn-sm btn-outline-danger" 
                    data-bs-toggle="modal" 
                    data-bs-target="#deleteModal"
                    (click)="prepareDelete(task.id)">
                <span class="d-none d-md-inline">Delete</span>
                <span class="d-md-none">X</span>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 text-center">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <p class="mt-3 fs-5">Are you sure you want to delete this task?</p>
        <p class="text-muted small">This action cannot be undone.</p>
      </div>
      <div class="modal-footer border-0 pb-4 justify-content-center">
        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger px-4" (click)="confirmDelete()" data-bs-dismiss="modal">Delete Task</button>
      </div>
    </div>
  </div>
</div>
