<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Login</h2>
      <p class="text-muted">Please enter your credentials</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input
          type="text"
          id="username"
          class="form-control"
          formControlName="username"
          [class.is-invalid]="username?.invalid && (username?.dirty || username?.touched)"
          placeholder="Enter your username"
        />
        <div class="invalid-feedback" *ngIf="username?.invalid && (username?.dirty || username?.touched)">
          Username is required
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          [class.is-invalid]="password?.invalid && (password?.dirty || password?.touched)"
          placeholder="Enter your password"
        />
        <div class="invalid-feedback" *ngIf="password?.invalid && (password?.dirty || password?.touched)">
          Password is required
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="loginForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Logging in...
        </span>
      </button>
    </form>

    <div class="login-footer mt-3">
      <small class="text-muted">
        Demo credentials: username: <strong>admin</strong>, password: <strong>password</strong>
      </small>
    </div>
  </div>
</div>
